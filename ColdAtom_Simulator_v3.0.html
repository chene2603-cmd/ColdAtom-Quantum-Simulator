<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ColdAtom Quantum Simulator v3.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        body {
            background: #1e1e2e;
            color: #cdd6f4;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #89b4fa;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .control-panel {
            background: #313244;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }
        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label {
            font-size: 14px;
            color: #a6adc8;
        }
        input[type="range"] {
            width: 100%;
            accent-color: #89b4fa;
        }
        .value-display {
            font-size: 12px;
            color: #f5c2e7;
        }
        .mode-buttons {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        button {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            background: #89b4fa;
            color: #1e1e2e;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #b4befe;
        }
        button.active {
            background: #cba6f7;
        }
        .visualization-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .panel {
            background: #313244;
            padding: 15px;
            border-radius: 10px;
        }
        .panel h2 {
            font-size: 18px;
            color: #89b4fa;
            margin-bottom: 10px;
        }
        canvas {
            border: 1px solid #45475a;
            border-radius: 5px;
            background: #1e1e2e;
            width: 100%;
        }
        .observables-panel {
            background: #313244;
            padding: 15px;
            border-radius: 10px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .observable-item {
            text-align: center;
        }
        .observable-label {
            font-size: 14px;
            color: #a6adc8;
        }
        .observable-value {
            font-size: 20px;
            font-weight: bold;
            color: #a6e3a1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ColdAtom Quantum Simulator v3.0 (Verifiable Physical Coupling)</h1>

        <div class="control-panel">
            <div class="slider-group">
                <label for="V0">Lattice Depth V₀ (Er)</label>
                <input type="range" id="V0" min="0" max="20" step="0.1" value="5">
                <span class="value-display" id="V0-value">5.0</span>
            </div>
            <div class="slider-group">
                <label for="U">Interaction U (Er)</label>
                <input type="range" id="U" min="0" max="100" step="1" value="20">
                <span class="value-display" id="U-value">20.0</span>
            </div>
            <div class="slider-group">
                <label>Hopping t (Er)</label>
                <span class="value-display" id="t-value">Calculated from V₀</span>
            </div>
            <div class="slider-group">
                <label>Effective U/t</label>
                <span class="value-display" id="Ut-value">Calculated</span>
            </div>
            <div class="mode-buttons">
                <button id="exp-mode" class="active">Experimental Mode</button>
                <button id="theory-mode">Theoretical Mode</button>
                <button id="reset-exp">Reset Exploration</button>
            </div>
        </div>

        <div class="visualization-area">
            <div class="panel">
                <h2>Real-Space Lattice (8×8)</h2>
                <canvas id="lattice-canvas" width="400" height="400"></canvas>
            </div>
            <div class="panel">
                <h2>Phase Diagram (U/t vs V₀)</h2>
                <canvas id="phase-canvas" width="400" height="400"></canvas>
            </div>
        </div>

        <div class="panel">
            <h2>Momentum Distribution (TOF Simulation)</h2>
            <canvas id="tof-canvas" width="800" height="300"></canvas>
        </div>

        <div class="observables-panel">
            <div class="observable-item">
                <div class="observable-label">Superfluid Order Parameter |⟨a⟩|</div>
                <div class="observable-value" id="order-param">0.00</div>
            </div>
            <div class="observable-item">
                <div class="observable-label">Number Fluctuation Δn</div>
                <div class="observable-value" id="num-fluct">0.00</div>
            </div>
            <div class="observable-item">
                <div class="observable-label">Phase State</div>
                <div class="observable-value" id="phase-state">Superfluid</div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/numeric/1.2.6/numeric.min.js"></script>
    <script>
        // Parameters
        let V0 = 5.0;
        let U = 20.0;
        let t = 0.0;
        let Ut = 0.0;
        let mode = 'experimental'; // 'experimental' or 'theoretical'
        let experimentalPoints = [];

        // DOM Elements
        const V0Slider = document.getElementById('V0');
        const USlider = document.getElementById('U');
        const V0Value = document.getElementById('V0-value');
        const UValue = document.getElementById('U-value');
        const tValue = document.getElementById('t-value');
        const UtValue = document.getElementById('Ut-value');
        const expModeBtn = document.getElementById('exp-mode');
        const theoryModeBtn = document.getElementById('theory-mode');
        const resetBtn = document.getElementById('reset-exp');
        const latticeCanvas = document.getElementById('lattice-canvas');
        const phaseCanvas = document.getElementById('phase-canvas');
        const tofCanvas = document.getElementById('tof-canvas');
        const orderParamEl = document.getElementById('order-param');
        const numFluctEl = document.getElementById('num-fluct');
        const phaseStateEl = document.getElementById('phase-state');

        // Calculate hopping integral t from V0 (deep lattice approximation)
        function calculateT(V0) {
            if (V0 <= 0) return 0;
            // t ≈ (4/√π) * V0^(3/4) * exp(-2*sqrt(V0))
            return (4 / Math.sqrt(Math.PI)) * Math.pow(V0, 3/4) * Math.exp(-2 * Math.sqrt(V0));
        }

        // Calculate observables based on V0 and U
        function calculateObservables(V0, U, t) {
            const Ut = U / t;
            const Uc_t = 25; // Critical U/t for superfluid-insulator transition (unit filling)
            
            let orderParam = 0;
            let numFluct = 0;
            let phaseState = '';

            if (Ut < Uc_t) {
                // Superfluid phase
                orderParam = Math.sqrt(1 - (Ut / Uc_t)); // Mean-field approximation
                numFuct = 0.2; // Small fluctuations in superfluid
                phaseState = 'Superfluid';
            } else {
                // Insulator phase
                orderParam = 0;
                numFuct = 0.8; // Large number fluctuations in Mott insulator
                phaseState = 'Mott Insulator';
            }

            return { Ut, orderParam, numFluct, phaseState };
        }

        // Generate lattice density (8x8)
        function generateLattice(V0, U, t, orderParam) {
            const size = 8;
            const lattice = [];
            const baseDensity = 1.0; // Unit filling

            for (let i = 0; i < size; i++) {
                const row = [];
                for (let j = 0; j < size; j++) {
                    let density = baseDensity;
                    // Add small randomness to simulate quantum fluctuations
                    if (orderParam > 0) {
                        // Superfluid: coherent, small density variations
                        density += (Math.random() - 0.5) * 0.1;
                    } else {
                        // Insulator: fixed density, no coherence
                        density = baseDensity;
                    }
                    row.push(Math.max(0, Math.min(1, density)));
                }
                lattice.push(row);
            }
            return lattice;
        }

        // Calculate structure factor S(k) (TOF momentum distribution)
        function calculateTOF(lattice) {
            const size = lattice.length;
            const kMax = 4;
            const kSteps = 100;
            const tofData = [];

            for (let kx = -kMax; kx <= kMax; kx += (2*kMax)/kSteps) {
                let sumRe = 0;
                let sumIm = 0;
                for (let i = 0; i < size; i++) {
                    for (let j = 0; j < size; j++) {
                        const r = i + j; // Position in lattice
                        const phase = kx * r;
                        sumRe += lattice[i][j] * Math.cos(phase);
                        sumIm += lattice[i][j] * Math.sin(phase);
                    }
                }
                const S = sumRe*sumRe + sumIm*sumIm;
                tofData.push(S);
            }
            return tofData;
        }

        // Draw lattice on canvas
        function drawLattice(lattice) {
            const ctx = latticeCanvas.getContext('2d');
            const size = lattice.length;
            const cellSize = latticeCanvas.width / size;

            ctx.clearRect(0, 0, latticeCanvas.width, latticeCanvas.height);

            for (let i = 0; i < size; i++) {
                for (let j = 0; j < size; j++) {
                    const density = lattice[i][j];
                    const alpha = density;
                    ctx.fillStyle = `rgba(137, 180, 250, ${alpha})`;
                    ctx.fillRect(j * cellSize, i * cellSize, cellSize - 1, cellSize - 1);
                }
            }
        }

        // Draw phase diagram
        function drawPhaseDiagram() {
            const ctx = phaseCanvas.getContext('2d');
            const width = phaseCanvas.width;
            const height = phaseCanvas.height;
            const Uc_t = 25;

            ctx.clearRect(0, 0, width, height);

            // Draw theoretical phase boundary (if in theoretical mode)
            if (mode === 'theoretical') {
                ctx.strokeStyle = '#f5c2e7';
                ctx.lineWidth = 2;
                ctx.beginPath();
                // Map V0 (0-20) to x, U/t (0-100) to y
                const x = (V0 / 20) * width;
                const y = (Uc_t / 100) * height;
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }

            // Draw experimental points
            ctx.fillStyle = '#a6e3a1';
            for (const point of experimentalPoints) {
                const x = (point.V0 / 20) * width;
                const y = (point.Ut / 100) * height;
                ctx.beginPath();
                ctx.arc(x, y, 3, 0, Math.PI * 2);
                ctx.fill();
            }

            // Draw current point
            const x = (V0 / 20) * width;
            const y = (Ut / 100) * height;
            ctx.fillStyle = '#f38ba8';
            ctx.beginPath();
            ctx.arc(x, y, 5, 0, Math.PI * 2);
            ctx.fill();
        }

        // Draw TOF momentum distribution
        function drawTOF(tofData) {
            const ctx = tofCanvas.getContext('2d');
            const width = tofCanvas.width;
            const height = tofCanvas.height;
            const step = width / tofData.length;
            const maxS = Math.max(...tofData);

            ctx.clearRect(0, 0, width, height);

            ctx.strokeStyle = '#89b4fa';
            ctx.lineWidth = 2;
            ctx.beginPath();
            for (let i = 0; i < tofData.length; i++) {
                const x = i * step;
                const y = height - (tofData[i] / maxS) * height;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        // Update all visualizations and observables
        function update() {
            t = calculateT(V0);
            const obs = calculateObservables(V0, U, t);
            Ut = obs.Ut;

            // Update display values
            V0Value.textContent = V0.toFixed(1);
            UValue.textContent = U.toFixed(1);
            tValue.textContent = t.toFixed(4);
            UtValue.textContent = Ut.toFixed(2);
            orderParamEl.textContent = obs.orderParam.toFixed(2);
            numFluctEl.textContent = obs.numFluct.toFixed(2);
            phaseStateEl.textContent = obs.phaseState;

            // Update visualizations
            const lattice = generateLattice(V0, U, t, obs.orderParam);
            drawLattice(lattice);
            drawPhaseDiagram();
            const tofData = calculateTOF(lattice);
            drawTOF(tofData);
        }

        // Event listeners
        V0Slider.addEventListener('input', (e) => {
            V0 = parseFloat(e.target.value);
            update();
        });

        USlider.addEventListener('input', (e) => {
            U = parseFloat(e.target.value);
            update();
        });

        expModeBtn.addEventListener('click', () => {
            mode = 'experimental';
            expModeBtn.classList.add('active');
            theoryModeBtn.classList.remove('active');
            update();
        });

        theoryModeBtn.addEventListener('click', () => {
            mode = 'theoretical';
            theoryModeBtn.classList.add('active');
            expModeBtn.classList.remove('active');
            update();
        });

        resetBtn.addEventListener('click', () => {
            experimentalPoints = [];
            update();
        });

        phaseCanvas.addEventListener('click', (e) => {
            if (mode !== 'experimental') return;
            const rect = phaseCanvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const V0_click = (x / phaseCanvas.width) * 20;
            const Ut_click = (y / phaseCanvas.height) * 100;
            experimentalPoints.push({ V0: V0_click, Ut: Ut_click });
            update();
        });

        // Initial update
        update();
    </script>
</body>
</html>
